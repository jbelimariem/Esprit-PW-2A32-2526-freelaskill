<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - FreelaSkill</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .auth-container {
      max-width: 400px;
      margin: 4rem auto;
      padding: 2rem;
      background: var(--bg-primary);
      border: 1px solid #e5e7eb;
      border-radius: 0.75rem;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    .auth-container h2 {
      text-align: center;
      margin-bottom: 2rem;
      color: var(--text-primary);
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
      color: var(--text-primary);
    }

    .form-group input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #d1d5db;
      border-radius: 0.5rem;
      font-size: 1rem;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--tech-blue);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .auth-links {
      text-align: center;
      margin-top: 1.5rem;
    }

    .auth-links a {
      color: var(--tech-blue);
      text-decoration: none;
    }

    .auth-links a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <header>
    <nav class="nav">
      <div class="logo"><i class="fa-solid fa-shapes"></i> Freela<span>Skill</span></div>
      <ul class="nav-links">
        <li><a href="index.html">Accueil</a></li>
        <li><a href="register.html">S'inscrire</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <div class="auth-container">
      <h2>Connexion</h2>
      <form id="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
          <label for="password">Mot de passe</label>
          <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Se connecter</button>
      </form>
      <div class="auth-links">
        <p>Pas encore de compte ? <a href="register.html">S'inscrire</a></p>
        <p><a href="#">Mot de passe oublié ?</a></p>
      </div>
    </div>
  </main>

  <footer>
    <p>&copy; 2023 FreelaSkill. Tous droits réservés.</p>
  </footer>

  <script>
    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      // Simple validation (in real app, this would be server-side)
      if (email && password) {
        alert('Connexion réussie !');
        // Redirect to dashboard or home
        window.location.href = 'index.html';
      } else {
        alert('Veuillez remplir tous les champs.');
      }
    });
  </script>
</body>
</html>

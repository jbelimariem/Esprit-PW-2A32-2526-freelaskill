  <main class="main-panel">
    <header style="margin-bottom: 3rem;">
      <h1 style="color:white;">Validations</h1>
      <p style="color: var(--text-muted);">Approuver ou rejeter les soumissions de projets et profils.</p>
    </header>

    <section class="table-container">
      <div class="table-header">
        <h3 style="color:white;">Soumissions en Attente</h3>
        <button class="btn btn-primary" onclick="refreshApprovals()">Actualiser</button>
      </div>
      <div style="padding: 2rem;">
        <table id="approvals-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Type</th>
              <th>Nom</th>
              <th>Soumis par</th>
              <th>Date</th>
              <th>Statut</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <!-- Data will be loaded here -->
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    // Sample data
    const approvalsData = [
      { id: 1, type: 'Projet', name: 'Développement Web', user: 'User1', date: '2023-10-01', status: 'pending' },
      { id: 2, type: 'Profil', name: 'Designer UI/UX', user: 'User2', date: '2023-10-02', status: 'pending' },
      { id: 3, type: 'Projet', name: 'App Mobile', user: 'User3', date: '2023-10-03', status: 'approved' },
    ];

    function loadApprovals() {
      const tbody = document.querySelector('#approvals-table tbody');
      tbody.innerHTML = '';
      approvalsData.forEach(item => {
        const statusClass = item.status === 'pending' ? 'status-pending' : item.status === 'approved' ? 'status-approved' : 'status-rejected';
        const statusText = item.status === 'pending' ? 'En attente' : item.status === 'approved' ? 'Approuvé' : 'Rejeté';
        const actions = item.status === 'pending' ? 
          `<button class="btn btn-approve" onclick="approve(${item.id})">Approuver</button><button class="btn btn-reject" onclick="reject(${item.id})">Rejeter</button>` : 
          '-';
        const row = `<tr>
          <td>${item.id}</td>
          <td>${item.type}</td>
          <td>${item.name}</td>
          <td>${item.user}</td>
          <td>${item.date}</td>
          <td><span class="status ${statusClass}">${statusText}</span></td>
          <td>${actions}</td>
        </tr>`;
        tbody.innerHTML += row;
      });
    }

    function approve(id) {
      const item = approvalsData.find(a => a.id === id);
      if (item) {
        item.status = 'approved';
        loadApprovals();
        alert(`Soumission ${id} approuvée`);
      }
    }

    function reject(id) {
      const item = approvalsData.find(a => a.id === id);
      if (item) {
        item.status = 'rejected';
        loadApprovals();
        alert(`Soumission ${id} rejetée`);
      }
    }

    function refreshApprovals() {
      loadApprovals();
    }

    // Load data on page load
    window.onload = loadApprovals;
  </script>
</body>

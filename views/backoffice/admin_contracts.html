<!DOCTYPE html>
<html lang="fr" style="color-scheme: dark;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Gestion des Contrats</title>
  <link rel="stylesheet" href="../Frontoffice/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { display: flex; min-height: 100vh; background: #03060E; overflow-x: hidden; }
    .sidebar { width: 280px; background: rgba(17,24,39,0.4); border-right: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(20px); padding: 2rem 0; position: fixed; height: 100vh; }
    .main-panel { margin-left: 280px; flex: 1; padding: 2rem 3rem; }
    .nav-item { display: flex; align-items: center; gap: 1rem; padding: 1rem 2rem; color: var(--text-muted); text-decoration: none; }
    .nav-item.active, .nav-item:hover { background: rgba(37,99,235,0.1); color: white; border-right: 4px solid var(--tech-blue); }
    .table-container { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 18px; margin-bottom: 3rem; overflow: hidden; }
    .table-header { padding: 1.5rem 2rem; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; }
    table { width: 100%; border-collapse: collapse; color: white; }
    th, td { padding: 1rem; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
    th { background: rgba(255,255,255,0.05); }
    .btn { padding: 0.5rem 1rem; border: none; border-radius: 8px; cursor: pointer; text-decoration: none; display: inline-block; margin-right: 0.5rem; }
    .btn-approve { background: #10B981; color: white; }
    .btn-reject { background: #EF4444; color: white; }
    .btn-view { background: rgba(255,255,255,0.1); color: white; }
    .status { padding: 0.25rem 0.5rem; border-radius: 4px; font-size: 0.75rem; }
    .status-active { background: #10B981; color: white; }
    .status-pending { background: #F59E0B; color: black; }
    .status-completed { background: #3B82F6; color: white; }
    .status-terminated { background: #EF4444; color: white; }
    .status-blocked { background: #7C3AED; color: white; }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div style="padding: 0 2rem; margin-bottom: 3rem;">
      <div class="logo"><i class="fa-solid fa-shapes" style="color: var(--tech-blue);"></i> Freela<span>Skill</span></div>
      <p style="font-size:0.75rem; color: var(--text-muted); margin-top:0.5rem;">Admin Control v3.0</p>
    </div>
    <a href="admin_dashboard.html" class="nav-item"><i class="fa-solid fa-chart-line"></i> Dashboard Central</a>
    <a href="admin_approbations.html" class="nav-item"><i class="fa-solid fa-check-circle"></i> Validations</a>
    <a href="admin_litiges.html" class="nav-item"><i class="fa-solid fa-exclamation-triangle"></i> Litiges</a>
    <a href="admin_contracts.html" class="nav-item active"><i class="fa-solid fa-file-contract"></i> Contrats</a>
    <a href="admin_archivage.html" class="nav-item"><i class="fa-solid fa-archive"></i> Archive</a>
  </aside>

  <main class="main-panel">
    <header style="margin-bottom: 3rem;">
      <h1 style="color:white;">Gestion des Contrats d'Engagement</h1>
      <p style="color: var(--text-muted);">Superviser et gérer tous les contrats actifs sur la plateforme.</p>
    </header>

    <section class="table-container">
      <div class="table-header">
        <h3 style="color:white;">Contrats Actifs</h3>
        <button class="btn btn-primary" onclick="refreshContracts()">Actualiser</button>
      </div>
      <div style="padding: 2rem;">
        <table id="contracts-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Projet</th>
              <th>Client</th>
              <th>Freelance</th>
              <th>Budget</th>
              <th>Statut</th>
              <th>Cohérence</th>
              <th>Signatures</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <!-- Data will be loaded here -->
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    // Sample contracts data with enhanced information
    const contractsData = [
      {
        id: 1,
        project: 'Développement Site E-commerce',
        client: 'TechCorp',
        freelance: 'DevPro',
        budget: 5000,
        status: 'pending',
        createdDate: '2023-10-01',
        description: 'Création d\'un site e-commerce complet',
        terms: 'Paiement par jalons, confidentialité totale',
        attachments: ['cahier-charges.pdf', 'maquettes.pdf'],
        signatures: { client: false, freelance: true },
        compliance: 'pending',
        conflicts: []
      },
      {
        id: 2,
        project: 'Design Logo',
        client: 'StartupXYZ',
        freelance: 'DesignMaster',
        budget: 1200,
        status: 'active',
        createdDate: '2023-09-15',
        description: 'Conception logo et charte graphique',
        terms: 'Livraison sous 30 jours',
        attachments: ['brief-design.pdf'],
        signatures: { client: true, freelance: true },
        compliance: 'approved',
        conflicts: []
      },
      {
        id: 3,
        project: 'App Mobile iOS',
        client: 'AppDev Inc.',
        freelance: 'MobileDev',
        budget: 8000,
        status: 'blocked',
        createdDate: '2023-11-01',
        description: 'Développement app mobile native',
        terms: 'Développement natif iOS',
        attachments: [],
        signatures: { client: true, freelance: false },
        compliance: 'rejected',
        conflicts: ['Signature freelance manquante']
      }
    ];

    function loadContracts() {
      const tbody = document.querySelector('#contracts-table tbody');
      tbody.innerHTML = '';
      contractsData.forEach(contract => {
        const statusClass = `status-${contract.status}`;
        const statusText = {
          'active': 'Actif',
          'completed': 'Terminé',
          'pending': 'En attente',
          'blocked': 'Bloqué',
          'terminated': 'Terminé'
        }[contract.status] || contract.status;

        const complianceText = {
          'approved': 'Conforme',
          'rejected': 'Non conforme',
          'pending': 'À vérifier'
        }[contract.compliance] || contract.compliance;

        const actions = `
          <button class="btn btn-view" onclick="verifyContract(${contract.id})">Vérifier</button>
          <button class="btn btn-approve" onclick="checkSignatures(${contract.id})">Signatures</button>
          <button class="btn btn-reject" onclick="manageConflict(${contract.id})">Conflits</button>
          <button class="btn btn-view" onclick="viewAudit(${contract.id})">Audit</button>
        `;

        const row = `<tr>
          <td>${contract.id}</td>
          <td>${contract.project}</td>
          <td>${contract.client}</td>
          <td>${contract.freelance}</td>
          <td>${contract.budget} €</td>
          <td><span class="status ${statusClass}">${statusText}</span></td>
          <td>${complianceText}</td>
          <td>${contract.signatures.client && contract.signatures.freelance ? 'Complet' : 'Incomplet'}</td>
          <td>${actions}</td>
        </tr>`;
        tbody.innerHTML += row;
      });
    }

    function verifyContract(id) {
      const contract = contractsData.find(c => c.id === id);
      const issues = [];

      // Vérifications de cohérence
      if (contract.budget < 500) issues.push('Budget trop faible pour la complexité');
      if (contract.attachments.length === 0) issues.push('Pièces jointes manquantes');
      if (!contract.description || contract.description.length < 20) issues.push('Description insuffisante');
      if (!contract.terms) issues.push('Conditions non définies');

      if (issues.length === 0) {
        contract.compliance = 'approved';
        alert(`Contrat ${id} : Cohérence vérifiée - Approuvé`);
      } else {
        contract.compliance = 'rejected';
        alert(`Contrat ${id} : Problèmes de cohérence :\n${issues.join('\n')}`);
      }
      loadContracts();
    }

    function checkSignatures(id) {
      const contract = contractsData.find(c => c.id === id);
      const clientSigned = contract.signatures.client;
      const freelanceSigned = contract.signatures.freelance;

      if (clientSigned && freelanceSigned) {
        alert(`Contrat ${id} : Toutes les signatures sont présentes`);
      } else {
        const missing = [];
        if (!clientSigned) missing.push('Client');
        if (!freelanceSigned) missing.push('Freelance');
        alert(`Contrat ${id} : Signatures manquantes : ${missing.join(', ')}`);
      }
    }

    function manageConflict(id) {
      const contract = contractsData.find(c => c.id === id);
      if (contract.conflicts.length === 0) {
        alert(`Contrat ${id} : Aucun conflit détecté`);
      } else {
        alert(`Contrat ${id} : Conflits :\n${contract.conflicts.join('\n')}`);
      }
    }

    function viewAudit(id) {
      const contract = contractsData.find(c => c.id === id);
      const auditTrail = [
        `${contract.createdDate} : Contrat créé`,
        contract.signatures.client ? `${contract.createdDate} : Signature client` : 'Signature client manquante',
        contract.signatures.freelance ? `${contract.createdDate} : Signature freelance` : 'Signature freelance manquante',
        `Statut actuel : ${contract.status}`,
        `Vérification cohérence : ${contract.compliance}`
      ];

      alert(`Historique du contrat ${id} :\n${auditTrail.join('\n')}`);
    }

    function refreshContracts() {
      loadContracts();
    }

    // Load data on page load
    window.onload = loadContracts;
  </script>
</body>
</html>

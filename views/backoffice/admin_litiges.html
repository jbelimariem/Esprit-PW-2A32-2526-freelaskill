  <main class="main-panel">
    <header style="margin-bottom: 3rem;">
      <h1 style="color:white;">Litiges</h1>
      <p style="color: var(--text-muted);">Gérer et résoudre les litiges entre utilisateurs et freelances.</p>
    </header>

    <section class="table-container">
      <div class="table-header">
        <h3 style="color:white;">Litiges Ouverts</h3>
        <button class="btn btn-primary" onclick="refreshDisputes()">Actualiser</button>
      </div>
      <div style="padding: 2rem;">
        <table id="disputes-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Projet</th>
              <th>Parties Impliquées</th>
              <th>Description</th>
              <th>Date</th>
              <th>Statut</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <!-- Data will be loaded here -->
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    // Sample data
    const disputesData = [
      { id: 1, project: 'Développement Web', parties: 'User1 vs Freelance1', description: 'Retard de livraison', date: '2023-10-01', status: 'open' },
      { id: 2, project: 'Design Logo', parties: 'User2 vs Freelance2', description: 'Qualité insatisfaisante', date: '2023-10-02', status: 'open' },
      { id: 3, project: 'App Mobile', parties: 'User3 vs Freelance3', description: 'Paiement non reçu', date: '2023-10-03', status: 'resolved' },
    ];

    function loadDisputes() {
      const tbody = document.querySelector('#disputes-table tbody');
      tbody.innerHTML = '';
      disputesData.forEach(item => {
        const statusClass = item.status === 'open' ? 'status-open' : item.status === 'resolved' ? 'status-resolved' : 'status-escalated';
        const statusText = item.status === 'open' ? 'Ouvert' : item.status === 'resolved' ? 'Résolu' : 'Escaladé';
        const actions = item.status === 'open' ? 
          `<button class="btn btn-resolve" onclick="resolve(${item.id})">Résoudre</button><button class="btn btn-escalate" onclick="escalate(${item.id})">Escalader</button>` : 
          '-';
        const row = `<tr>
          <td>${item.id}</td>
          <td>${item.project}</td>
          <td>${item.parties}</td>
          <td>${item.description}</td>
          <td>${item.date}</td>
          <td><span class="status ${statusClass}">${statusText}</span></td>
          <td>${actions}</td>
        </tr>`;
        tbody.innerHTML += row;
      });
    }

    function resolve(id) {
      const item = disputesData.find(d => d.id === id);
      if (item) {
        item.status = 'resolved';
        loadDisputes();
        alert(`Litige ${id} résolu`);
      }
    }

    function escalate(id) {
      const item = disputesData.find(d => d.id === id);
      if (item) {
        item.status = 'escalated';
        loadDisputes();
        alert(`Litige ${id} escaladé`);
      }
    }

    function refreshDisputes() {
      loadDisputes();
    }

    // Load data on page load
    window.onload = loadDisputes;
  </script>
</body>
